apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-frontend
  namespace: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: website-frontend
  template:
    metadata:
      labels:
        app: website-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/marafis/marafis.com:latest
          ports:
            - containerPort: 80
