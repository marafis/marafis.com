<div class="sidebar-block">
  <div class="sidebar-title">Most Read</div>

  @if (mostReadArticles.length === 0) {
    <!-- Skeleton placeholders while data loads -->
    @for (i of [1, 2, 3]; track i) {
      <div class="popular-post skeleton">
        <span class="pp-num">{{ i }}</span>
        <div class="skeleton-body">
          <div class="skeleton-line long"></div>
          <div class="skeleton-line short"></div>
        </div>
      </div>
    }
  }

  @for (article of mostReadArticles; track article.id; let i = $index) {
    <a class="popular-post"
       [routerLink]="['/insights', article.category.slug, article.slug]">
      <span class="pp-num">{{ i + 1 }}</span>
      <div>
        <div class="pp-title">{{ article.title }}</div>
        <div class="pp-meta">
          {{ article.date | date:'MMM yyyy' }}
          &nbsp;·&nbsp;
          {{ article.readTime }}
        </div>
      </div>
    </a>
  }
</div>
