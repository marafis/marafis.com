<div class="featured-label">Featured Article</div>
<article class="featured-card"
         [routerLink]="featuredArticle ? ['/insights', featuredArticle.category.slug, featuredArticle.slug] : null">
  <div class="featured-image">
    <div class="featured-image-pattern"></div>
    <div class="featured-image-svg">
      <svg width="260" height="260" viewBox="0 0 260 260" fill="none">
        <circle cx="130" cy="130" r="100" stroke="#C9A84C" stroke-width="0.5"/>
        <circle cx="130" cy="130" r="70"  stroke="#C9A84C" stroke-width="0.5"/>
        <circle cx="130" cy="130" r="40"  stroke="#C9A84C" stroke-width="0.5"/>
        <circle cx="130" cy="130" r="10"  fill="#C9A84C"/>
        <line x1="130" y1="0"   x2="130" y2="260" stroke="#C9A84C" stroke-width="0.5"/>
        <line x1="0"   y1="130" x2="260" y2="130" stroke="#C9A84C" stroke-width="0.5"/>
      </svg>
    </div>
    <!-- use category.name not category (was object) -->
    <span class="featured-image-tag">{{ featuredArticle?.category?.name }}</span>
  </div>
  <div class="featured-body">
    <div>
      <div class="article-meta">
        <span class="article-date">{{ featuredArticle?.date | date:'MMM, yyyy' }},</span>
        <span class="article-dot"></span>
        <span class="article-read">{{ featuredArticle?.readTime }}</span>
      </div>
      <h2 class="featured-title">{{ featuredArticle?.title }}</h2>
      <!-- use excerpt not description for the preview text -->
      <p class="featured-excerpt">{{ featuredArticle?.excerpt }}</p>
    </div>
    <div>
      <div class="featured-author">
        <div class="author-avatar">M</div>
        <div>
          <div class="author-name">Marafis Consulting</div>
          <div class="author-role">Principal Architect</div>
        </div>
      </div>
      <!-- proper routerLink instead of empty <a> -->
      <a [routerLink]="featuredArticle ? ['/insights', featuredArticle.category.slug, featuredArticle.slug] : null"
         class="read-link"
         (click)="$event.stopPropagation()">
        Read article
        <svg width="14" height="8" viewBox="0 0 14 8" fill="none">
          <line x1="0" y1="4" x2="12" y2="4" stroke="#C9A84C" stroke-width="0.75"/>
          <polyline points="8,1 12,4 8,7" stroke="#C9A84C" stroke-width="0.75" fill="none"/>
        </svg>
      </a>
    </div>
  </div>
</article>
