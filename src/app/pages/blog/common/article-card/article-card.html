<!-- added [routerLink] so card links correctly to /insights/:category/:slug -->
<article class="article-card"
         [routerLink]="['/insights', article?.category?.slug, article?.slug]">
  <div class="card-tag">{{ article?.category?.name }}</div>
  <h2 class="article-title">{{ article?.title }}</h2>
  <p class="article-excerpt">{{ article?.excerpt }}</p>
  <div class="article-footer">
    <div class="article-meta">
      <span class="article-date">{{ article?.date | date:'MMM, yyyy' }}</span>
      <span class="article-dot"></span>
      <span class="article-read">{{ article?.readTime }}</span>
    </div>
    <a [routerLink]="['/insights', article?.category?.slug, article?.slug]"
       class="card-read-link"
       (click)="$event.stopPropagation()">
      Read →
    </a>
  </div>
</article>
