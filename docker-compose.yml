version: '3.8'

services:
  # The Nginx Load Balancer / Reverse Proxy
  load_balancer:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_challenge:/var/www/certbot
    depends_on:
      - web_app_1
      - web_app_2

  # Certbot to handle free Let's Encrypt SSL certificates
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_challenge:/var/www/certbot
    # This checks every 12 hours if your SSL certificate needs renewing
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # Your App Container 1
  web_app_1:
    image: nginxdemos/hello:plain
    restart: always

  # Your App Container 2
  web_app_2:
    image: nginxdemos/hello:plain
    restart: always

volumes:
  certbot_certs:
  certbot_challenge: