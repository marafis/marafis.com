version: '3.8'

services:
  load_balancer:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web_app_1
      - web_app_2

  web_app_1:
    image: nginx:alpine
    restart: always
    volumes:
      - ./web_app_1:/usr/share/nginx/html:ro

  web_app_2:
    image: nginx:alpine
    restart: always
    volumes:
      - ./web_app_2:/usr/share/nginx/html:ro