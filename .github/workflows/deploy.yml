name: Build, Push & Update GitOps Infra

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code repo
        uses: actions/checkout@v4

      - name: Set variables (single source of truth for image + tag)
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/frontend" >> $GITHUB_ENV
          echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$TAG .
          docker tag $IMAGE_NAME:$TAG $IMAGE_NAME:latest

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:$TAG
          docker push $IMAGE_NAME:latest

      # ==============================
      # 🚀 GITOPS AUTO UPDATE STEP
      # ==============================
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: marafis/marafis-infra
          token: ${{ secrets.GITHUB_TOKEN }}
          path: infra

      - name: Update deployment image in infra repo
        run: |
          sed -i "s|image: .*frontend:.*|image: $IMAGE:$TAG|g" infra/frontend/deployment.yml

      - name: Commit and push infra changes
        run: |
          cd infra
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "update frontend image to $TAG"
          git push
