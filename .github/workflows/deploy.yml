name: Build, Push & Update GitOps Infra

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:

      # =========================
      # 🔵 CI PHASE START
      # =========================

      - name: 1. Checkout WEB repo (CI)
        uses: actions/checkout@v4

      - name: 2. Set image variables (CI)
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/frontend" >> $GITHUB_ENV
          echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: 3. Login to GHCR (CI)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 4. Build and push image (CI)
        run: |
          docker build -t $IMAGE_NAME:$TAG .
          docker push $IMAGE_NAME:$TAG

      # =========================
      # 🟢 CD PHASE START (GitOps)
      # =========================

      - name: 5. Checkout INFRA repo (CD)
        uses: actions/checkout@v4
        with:
          repository: marafis/marafis-infra
          token: ${{ secrets.INFRA_TOKEN }}
          path: infra
          # persist-credentials: true  ← this is the default; no need to reset remote

      - name: 6. Verify deployment file exists (CD)
        run: |
          test -f infra/frontend/deployment.yaml

      - name: 7. Update image in deployment file (CD)
        run: |
          sed -i "s|image: .*frontend:.*|image: $IMAGE_NAME:$TAG|g" infra/frontend/deployment.yaml

      - name: 8. Commit and push infra changes (CD)
        run: |
          cd infra
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/deployment.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update frontend image to ${{ env.TAG }}"
          git push origin HEAD
