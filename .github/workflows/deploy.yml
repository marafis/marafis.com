name: Build, Push & Update GitOps Infra

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:

      # =========================
      # 🔵 CI PHASE START
      # =========================

      - name: Checkout WEB repo (CI)
        uses: actions/checkout@v4

      - name: Set image variables (CI)
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/frontend" >> $GITHUB_ENV
          echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GHCR (CI)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (CI)
        run: |
          docker build -t $IMAGE_NAME:$TAG .
          docker push $IMAGE_NAME:$TAG

      # =========================
      # 🟢 CD PHASE START (GitOps)
      # =========================

      - name: Checkout INFRA repo (CD)
        uses: actions/checkout@v4
        with:
          repository: marafis/marafis-infra
          token: ${{ secrets.INFRA_TOKEN }}
          path: infra

      - name: Debug infra structure (CD)
        run: |
          ls -R infra

      - name: Verify deployment file exists (CD)
        run: |
          test -f infra/frontend/deployment.yaml

      - name: Update image in deployment file (CD)
        run: |
          sed -i "s|image: .*frontend:.*|image: $IMAGE_NAME:$TAG|g" infra/frontend/deployment.yaml

      - name: Commit and push infra changes (CD)
        run: |
          cd infra
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "update frontend image to $TAG" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.INFRA_TOKEN }}@github.com/marafis/marafis-infra.git
