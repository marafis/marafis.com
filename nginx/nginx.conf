events { worker_connections 1024; }

http {
    # Define your backend application instances for load balancing
    upstream backend_apps {
        server web_app_1:80;
        server web_app_2:80;
    }

    # 1. HTTP Configuration (Redirects all traffic to HTTPS)
    server {
        listen 80;
        server_name marafis.com www.marafis.com;

        # Webroot path for Certbot SSL renewals
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. HTTPS Configuration (Secure Load Balancer)
    server {
        listen 443 ssl;
        server_name marafis.com www.marafis.com;

        # SSL Certificates (Certbot will generate these)
        ssl_certificate /etc/letsencrypt/live/marafis.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/marafis.com/privkey.pem;

        location / {
            proxy_pass http://backend_apps;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}